name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.repository == 'weave-agent/weave-tui'

    steps:
      - name: Create release PR or GitHub release
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
